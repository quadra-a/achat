# Build release binaries and upload to GitHub Releases when a version tag is pushed.
#
# Usage:  git tag v0.1.0 && git push origin v0.1.0
#
# Produces assets like:
#   achat-x86_64-unknown-linux-gnu.tar.gz
#   achat-aarch64-unknown-linux-gnu.tar.gz
#   achat-x86_64-apple-darwin.tar.gz
#   achat-aarch64-apple-darwin.tar.gz

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to create releases & upload assets

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: achat

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

          - target: x86_64-apple-darwin
            os: macos-latest

          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation toolchain for Linux aarch64
      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          staging="achat-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/$BINARY_NAME" "$staging/"
          cp LICENSE README.md "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" -C "$staging" .
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: achat-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for changelog, if any)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir release-assets
          find artifacts -name '*.tar.gz' -exec mv {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/SHA256SUMS.txt
