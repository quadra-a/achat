name: Bug Report
description: Report a bug in achat
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
  - type: input
    id: version
    attributes:
      label: achat version (`achat --version`)
      placeholder: "0.1.0"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, etc."
